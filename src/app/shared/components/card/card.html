<div class="border relative w-fit shadow-2xl mt-8 rounded-2xl overflow-hidden">

  <!-- Figura superior -->
  <div
    class="absolute
          -top-5
          -left-6
          w-46
          h-44
          bg-amber-500
          hover:bg-amber-400
          rounded-full
          [mask:radial-gradient(110px_at_80%_80%,transparent_98%,black)]">
  </div>

  <!-- Figura inferior -->
  <div
    class="
      absolute
      bottom-0
      -right-2.5
      w-0
      h-0
      border-solid
      border-[0_0_67px_67px]
      border-transparent
      border-b-amber-500
      hover:border-b-amber-400
    "
  ></div>

  <div class="w-80 h-88 px-5">

    <img
      [src]="image()"
      [alt]="title()"
      class="rounded-full mt-8 ml-4">

    <h2 class="text-2xl font-bold mt-2">
      {{ title() }}
    </h2>

    <p class="text-[18px] mt-3">
      {{ description() }}
    </p>

  </div>

</div>
